                                ${state.feedback ? 'disabled' : ''}
                            />
                            <button 
                                type="submit"
                                ${state.feedback ? 'disabled' : ''}
                                class="w-full font-bold py-5 rounded-[2rem] transition-all shadow-md flex items-center justify-center gap-2 bg-stone-800 hover:bg-stone-900 text-white"
                            >
                                檢查答案
                            </button>
                        </form>

                        <div class="h-20 mt-4 flex items-center justify-center" id="feedback-area">
                            ${state.feedback ? `
                                <div class="p-4 rounded-2xl flex items-center gap-3 animate-in fade-in slide-in-from-bottom-2 ${state.feedback.type === 'success' ? 'text-green-600 bg-green-50' : 'text-red-500 bg-red-50'}">
                                    ${state.feedback.type === 'success' ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>'}
                                    <p class="font-bold text-sm leading-relaxed">${state.feedback.message}</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                
                const form = document.getElementById('answer-form');
                const input = document.getElementById('user-input');
                if (input && !state.feedback) input.focus();
                
                form.onsubmit = (e) => {
                    e.preventDefault();
                    const val = input.value.trim().toLowerCase();
                    if (!val || state.feedback) return;
                    
                    if (val === currentWord.en.toLowerCase()) {
                        handleCorrect();
                    } else {
                        handleWrong(val);
                    }
                };
            } else if (state.gameState === 'finished') {
                const avg = (state.elapsedTime / state.targetScore).toFixed(1);
                app.innerHTML = `
                    <div class="p-8 max-h-[85vh] overflow-y-auto custom-scrollbar">
                        <div class="text-center mb-10 mt-4">
                            <div class="inline-block p-6 bg-stone-50 rounded-full text-stone-300 mb-6 border border-stone-100">
                                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
                            </div>
                            <h2 class="text-3xl font-black text-stone-800">完成挑戰！</h2>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-stone-50 p-6 rounded-3xl text-center border border-stone-100">
                                <p class="text-[10px] text-stone-400 font-black uppercase mb-1 tracking-widest">總時間</p>
                                <p class="text-xl font-black text-stone-700">${formatTime(state.elapsedTime)}</p>
                            </div>
                            <div class="bg-stone-50 p-6 rounded-3xl text-center border border-stone-100">
                                <p class="text-[10px] text-stone-400 font-black uppercase mb-1 tracking-widest">答對題數</p>
                                <p class="text-xl font-black text-stone-700">${state.score} / ${state.targetScore}</p>
                            </div>
                        </div>
                        
                        <div class="bg-stone-800 p-6 rounded-3xl text-center mb-8 shadow-inner flex items-center justify-between">
                            <div class="flex items-center gap-3 text-stone-400">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"></path><path d="M3.34 19a10 10 0 1 1 17.32 0"></path></svg>
                                <p class="text-[10px] font-black uppercase tracking-widest text-left">平均一題<br/>作答時間</p>
                            </div>
                            <p class="text-2xl font-black text-white">${avg}s</p>
                        </div>

                        <div class="mb-10">
                            <h3 class="font-bold text-stone-600 mb-4 px-2 flex justify-between">
                                <span>錯題回顧</span>
                                <span class="text-stone-400 text-xs">${state.wrongAttempts.length} 題</span>
                            </h3>
                            ${state.wrongAttempts.length > 0 ? `
                                <div class="space-y-3">
                                    ${state.wrongAttempts.map(a => `
                                        <div class="bg-white p-4 rounded-2xl border border-stone-100 shadow-sm flex flex-col gap-1">
                                            <div class="flex justify-between items-center">
                                                <span class="font-bold text-stone-700">${a.question}</span>
                                                <span class="text-xs text-red-400 line-through">${a.user || '(未填寫)'}</span>
                                            </div>
                                            <div class="text-[9px] text-stone-300 font-black uppercase tracking-widest mt-1">正確應為</div>
                                            <span class="font-mono font-black text-stone-800 uppercase text-lg">${a.correct}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : `
                                <div class="bg-stone-50 p-8 rounded-3xl text-center border-2 border-dashed border-stone-200 text-stone-400 text-sm italic">
                                    完美通關！沒有任何錯誤。
                                </div>
                            `}
                        </div>

                        <button onclick="startGame()" class="w-full bg-stone-800 text-white font-bold py-5 rounded-[2rem] flex items-center justify-center gap-2 active:scale-95 transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path><path d="M16 16h5v5"></path></svg>
                            再玩一次
                        </button>
                    </div>
                `;
            }
        }

        function startGame() {
            const shuffled = [...wordBank].sort(() => Math.random() - 0.5);
            state = {
                ...state,
                gameState: 'playing',
                shuffledQueue: shuffled,
                currentIndex: 0,
                score: 0,
                wrongAttempts: [],
                startTime: Date.now(),
                elapsedTime: 0,
                feedback: null
            };
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                state.elapsedTime = Math.floor((Date.now() - state.startTime) / 1000);
                const timerEl = document.getElementById('timer-display');
                if (timerEl) timerEl.innerText = formatTime(state.elapsedTime);
            }, 1000);
            
            render();
        }

        function handleCorrect() {
            state.feedback = { type: 'success', message: '答對囉！ ✨' };
            state.score++;
            render();
            
            setTimeout(() => {
                if (state.score >= state.targetScore || state.currentIndex >= state.shuffledQueue.length - 1) {
                    finishGame();
                } else {
                    state.currentIndex++;
                    state.feedback = null;
                    render();
                }
            }, 800);
        }

        function handleWrong(userInput) {
            const word = state.shuffledQueue[state.currentIndex];
            state.feedback = { type: 'error', message: `答錯了！正確答案是：${word.en}` };
            state.wrongAttempts.push({
                question: word.zh,
                correct: word.en,
                user: userInput
            });
            render();
            
            setTimeout(() => {
                if (state.currentIndex >= state.shuffledQueue.length - 1) {
                    finishGame();
                } else {
                    state.currentIndex++;
                    state.feedback = null;
                    render();
                }
            }, 2000);
        }

        function finishGame() {
            state.gameState = 'finished';
            clearInterval(timerInterval);
            render();
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}分${secs}秒`;
        }

        // 初始化
        render();
    </script>
</body>
</html>
